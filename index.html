<!DOCTYPE html>
<html>
<head>
    <title>Code Kadai</title>

    <script>
        function showPDFs() {
            var pass = prompt("Enter Password:");

            if (pass === "pass podra") {
                document.getElementById("pdfSection").style.display = "block";
                document.getElementById("practicalBtn").style.display = "none";
            } else {
                alert("Wrong Password!");
            }
        }
    </script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .main-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .pdf-btn {
            display: block;
            margin: 15px auto;
            padding: 12px;
            width: 220px;
            background: #333;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        #pdfSection {
            display: none;
        }
    </style>
</head>

<body>

<h1>🔥 Code Kadai</h1>

<button id="practicalBtn" class="main-btn" onclick="showPDFs()">
    Practical
</button>

<div id="pdfSection">

    <a class="pdf-btn" href="python.pdf" target="_blank">Python</a>
    <a class="pdf-btn" href="AOS.pdf" target="_blank">AOS</a>
    <a class="pdf-btn" href="AIML.pdf" target="_blank">AI</a>
    <a class="pdf-btn" href="DVT.pdf" target="_blank">DVT</a>
    <a class="pdf-btn" href="IOT_Practical.pdf" target="_blank">IOT</a>

</div>

</body>
</html>
